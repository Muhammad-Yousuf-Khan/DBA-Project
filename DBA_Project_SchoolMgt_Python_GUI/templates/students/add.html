{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('students_list') }}">Students</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Add
    </div>
    <h1><i class="fas fa-user-plus"></i> Add New Student</h1>
  </div>
  <a href="{{ url_for('students_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:860px;">
  <div class="card-header">
    <div class="card-title"><i class="fas fa-edit"></i> Student Details</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">First Name <span class="required">*</span></label>
          <input type="text" name="first_name" class="form-control"
                 placeholder="Enter first name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control"
                 placeholder="Enter last name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="date_of_birth" class="form-control"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Class</label>
          <select name="class_id" class="form-control">
            <option value="">Select Class</option>
            {% for cls in classes %}
            <option value="{{ cls.class_id }}">{{ cls.class_name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Admission Date</label>
          <input type="date" name="admission_date" class="form-control"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> Save Student
        </button>
        <a href="{{ url_for('students_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
