{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('students_list') }}">Students</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Edit
    </div>
    <h1><i class="fas fa-user-edit"></i> Edit Student #{{ student.student_id }}</h1>
  </div>
  <a href="{{ url_for('students_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:860px;">
  <div class="card-header">
    <div class="card-title"><i class="fas fa-edit"></i> Update Student Details</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">First Name <span class="required">*</span></label>
          <input type="text" name="first_name" class="form-control"
                 value="{{ student.first_name }}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control"
                 value="{{ student.last_name or '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" name="date_of_birth" class="form-control"
                 value="{{ student.date_of_birth or '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control">
            <option value="">Select Gender</option>
            <option {% if student.gender=='Male' %}selected{% endif %}>Male</option>
            <option {% if student.gender=='Female' %}selected{% endif %}>Female</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Class</label>
          <select name="class_id" class="form-control">
            <option value="">Select Class</option>
            {% for cls in classes %}
            <option value="{{ cls.class_id }}"
              {% if cls.class_id == student.class_id %}selected{% endif %}>
              {{ cls.class_name }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Admission Date</label>
          <input type="date" name="admission_date" class="form-control"
                 value="{{ student.admission_date or '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-control">
            <option value="active"   {% if student.status=='active' %}selected{% endif %}>Active</option>
            <option value="inactive" {% if student.status=='inactive' %}selected{% endif %}>Inactive</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-warning">
          <i class="fas fa-save"></i> Update Student
        </button>
        <a href="{{ url_for('students_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
