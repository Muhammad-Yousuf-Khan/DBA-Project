{% extends "base.html" %}
{% block title %}Add Subject{% endblock %}
{% block page_title %}Add Subject{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('subjects_list') }}">Subjects</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Add
    </div>
    <h1><i class="fas fa-plus"></i> Add New Subject</h1>
  </div>
  <a href="{{ url_for('subjects_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group mb-3">
        <label class="form-label">Subject Name <span class="required">*</span></label>
        <input type="text" name="subject_name" class="form-control"
               placeholder="e.g. Physics" required/>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> Save Subject
        </button>
        <a href="{{ url_for('subjects_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
