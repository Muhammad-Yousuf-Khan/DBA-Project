{% extends "base.html" %}
{% block title %}Edit Subject{% endblock %}
{% block page_title %}Edit Subject{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1><i class="fas fa-edit"></i> Edit Subject</h1>
  </div>
  <a href="{{ url_for('subjects_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group mb-3">
        <label class="form-label">Subject Name <span class="required">*</span></label>
        <input type="text" name="subject_name" class="form-control"
               value="{{ subject.subject_name }}" required/>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning">
          <i class="fas fa-save"></i> Update Subject
        </button>
        <a href="{{ url_for('subjects_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
