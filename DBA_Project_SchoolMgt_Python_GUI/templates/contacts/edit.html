{% extends "base.html" %}
{% block title %}Edit Contact{% endblock %}
{% block page_title %}Edit Contact{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1><i class="fas fa-edit"></i> Edit Contact</h1>
    <p>Student: <strong>{{ contact.first_name }} {{ contact.last_name or '' }}</strong></p>
  </div>
  <a href="{{ url_for('contacts_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Guardian Name <span class="required">*</span></label>
          <input type="text" name="guardian_name" class="form-control"
                 value="{{ contact.guardian_name }}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Relation</label>
          <select name="relation" class="form-control">
            <option value="">Select</option>
            {% for rel in ['Father','Mother','Guardian','Other'] %}
            <option {% if contact.relation==rel %}selected{% endif %}>{{ rel }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ contact.phone or '' }}"/>
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label class="form-label">Address</label>
          <input type="text" name="address" class="form-control"
                 value="{{ contact.address or '' }}"/>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-warning">
          <i class="fas fa-save"></i> Update Contact
        </button>
        <a href="{{ url_for('contacts_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
