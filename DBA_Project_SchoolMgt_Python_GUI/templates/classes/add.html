{% extends "base.html" %}
{% block title %}Add Class{% endblock %}
{% block page_title %}Add Class{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('classes_list') }}">Classes</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Add
    </div>
    <h1><i class="fas fa-plus"></i> Add New Class</h1>
  </div>
  <a href="{{ url_for('classes_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Class Name <span class="required">*</span></label>
          <input type="text" name="class_name" class="form-control"
                 placeholder="e.g. Grade 6" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Incharge Teacher</label>
          <select name="class_incharge" class="form-control">
            <option value="">Select Teacher</option>
            {% for t in teachers %}
            <option value="{{ t.teacher_id }}">{{ t.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> Save Class
        </button>
        <a href="{{ url_for('classes_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
