{% extends "base.html" %}
{% block title %}Add Teacher{% endblock %}
{% block page_title %}Add Teacher{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('teachers_list') }}">Teachers</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Add
    </div>
    <h1><i class="fas fa-user-plus"></i> Add New Teacher</h1>
  </div>
  <a href="{{ url_for('teachers_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-header">
    <div class="card-title"><i class="fas fa-chalkboard-teacher"></i> Teacher Details</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="Enter full name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="teacher@school.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="0300-0000000"/>
        </div>
        <div class="form-group">
          <label class="form-label">Hire Date</label>
          <input type="date" name="hire_date" class="form-control"/>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">
          <i class="fas fa-save"></i> Save Teacher
        </button>
        <a href="{{ url_for('teachers_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
