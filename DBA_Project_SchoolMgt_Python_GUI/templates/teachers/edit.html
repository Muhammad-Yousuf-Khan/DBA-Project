{% extends "base.html" %}
{% block title %}Edit Teacher{% endblock %}
{% block page_title %}Edit Teacher{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb">
      <a href="{{ url_for('dashboard') }}">Home</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i>
      <a href="{{ url_for('teachers_list') }}">Teachers</a>
      <i class="fas fa-chevron-right" style="font-size:10px;"></i> Edit
    </div>
    <h1><i class="fas fa-user-edit"></i> Edit Teacher #{{ teacher.teacher_id }}</h1>
  </div>
  <a href="{{ url_for('teachers_list') }}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-header">
    <div class="card-title"><i class="fas fa-edit"></i> Update Teacher Details</div>
    <span class="badge badge-warning">Audit trigger will log this change</span>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" name="name" class="form-control"
                 value="{{ teacher.name }}" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ teacher.email or '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control"
                 value="{{ teacher.phone or '' }}"/>
        </div>
        <div class="form-group">
          <label class="form-label">Hire Date</label>
          <input type="date" name="hire_date" class="form-control"
                 value="{{ teacher.hire_date or '' }}"/>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-warning">
          <i class="fas fa-save"></i> Update Teacher
        </button>
        <a href="{{ url_for('teachers_list') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
